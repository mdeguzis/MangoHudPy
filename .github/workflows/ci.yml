name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── Run tests on every push/PR ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # PySide6 needs OpenGL/EGL libs even in offscreen mode
      - name: Install Qt system libraries
        run: sudo apt-get install -y --no-install-recommends libgl1 libegl1 libglib2.0-0

      - name: Install dependencies
        run: uv sync --extra gui --extra graphs --group dev

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest tests/ -v

  # ── Auto-tag when pyproject.toml version is new ─────────────────────────────
  autotag:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      tag_created: ${{ steps.tag.outputs.tag_created }}
      version: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to check existing tags

      - name: Create tag if version is new
        id: tag
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping"
            echo "tag_created=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
            echo "tag_created=true" >> $GITHUB_OUTPUT
          fi

  # ── Build wheel + sdist and publish to GitHub Release ────────────────────────
  # Triggers when autotag creates a new tag, or when a v* tag is pushed directly
  build:
    needs: [test, autotag]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (
        needs.autotag.outputs.tag_created == 'true' ||
        (needs.autotag.result == 'skipped' && startsWith(github.ref, 'refs/tags/v'))
      )
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to create/update GitHub releases

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv build

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.autotag.outputs.tag_created == 'true' && format('v{0}', needs.autotag.outputs.version) || github.ref_name }}
          files: dist/*
