name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── Run tests on every push/PR ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # PySide6 needs OpenGL/EGL libs even in offscreen mode
      - name: Install Qt system libraries
        run: sudo apt-get install -y --no-install-recommends libgl1 libegl1 libglib2.0-0

      - name: Install dependencies
        run: uv sync --extra gui --extra graphs --group dev

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest tests/ -v

  # ── Auto-tag when pyproject.toml version is new ─────────────────────────────
  autotag:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to check existing tags

      - name: Create tag if version is new
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="v$VERSION"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          fi

  # ── Build wheel + sdist and publish to GitHub Release (tags only) ───────────
  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to create/update GitHub releases

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv build

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
